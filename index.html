<style>
  :root {
    /* Default theme — overridden inline by App via tweak values */
    --bg: #f5f1e8;
    --bg-2: #efe9dc;
    --paper: #faf6ec;
    --ink: #1a2233;
    --ink-2: #2c3849;
    --muted: #6e7686;
    --rule: rgba(26, 34, 51, 0.12);
    --accent: #c2410c;
    --accent-soft: rgba(194, 65, 12, 0.08);

    --font-serif: "Instrument Serif", "Cormorant Garamond", Georgia, serif;
    --font-sans: "Poppins", system-ui, -apple-system, sans-serif;
    --font-mono: "Poppins", system-ui, -apple-system, sans-serif;

    --maxw: 1240px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 16px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }

  /* ── NAV ──────────────────────────────────────────────────────────────── */
  .nav {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(14px) saturate(180%);
    -webkit-backdrop-filter: blur(14px) saturate(180%);
    background: color-mix(in oklab, var(--bg) 78%, transparent);
    border-bottom: 0.5px solid var(--rule);
  }
  .nav-inner {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .nav-links {
    display: flex; align-items: center; gap: 28px;
    font-size: 13.5px;
    color: var(--ink-2);
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-cta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px;
    background: var(--ink);
    color: var(--bg);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.15s, background 0.15s;
  }
  .nav-cta:hover { background: var(--accent); }

  /* ── PAGE WRAPPER ─────────────────────────────────────────────────────── */
  main { display: block; }
  section {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 80px 32px;
  }

  /* ── TYPE ─────────────────────────────────────────────────────────────── */
  .display {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: clamp(56px, 9vw, 116px);
    line-height: 0.94;
    letter-spacing: -0.02em;
    margin: 0 0 28px;
    color: var(--ink);
  }
  .display-em {
    font-style: italic;
    color: var(--accent);
  }
  .section-title {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: clamp(40px, 5.5vw, 72px);
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 0 0 56px;
    color: var(--ink);
  }
  .section-title .muted { color: var(--muted); font-style: italic; }
  .kicker {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }
  .kicker.light { color: rgba(255,255,255,0.7); }
  .section-head { margin-bottom: 40px; }

  /* ── BUTTONS ──────────────────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    transition: transform 0.15s, background 0.15s, color 0.15s;
    cursor: pointer;
    border: none;
  }
  .btn-primary {
    background: #25D366; /* WhatsApp green — recognized affordance */
    color: white;
  }
  .btn-primary:hover { background: #1ebe5d; transform: translateY(-1px); }
  .btn-ghost {
    background: transparent;
    color: var(--ink);
    border: 0.5px solid var(--rule);
  }
  .btn-ghost:hover { border-color: var(--ink); }
  .btn-lg { padding: 18px 28px; font-size: 17px; border-radius: 12px; }

  /* ── HERO ─────────────────────────────────────────────────────────────── */
  .hero { padding-top: 56px; padding-bottom: 56px; }
  .hero-grid {
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 7px 14px 7px 10px;
    border: 0.5px solid var(--rule);
    border-radius: 999px;
    font-size: 12.5px;
    color: var(--ink-2);
    margin-bottom: 36px;
    background: color-mix(in oklab, var(--paper) 60%, transparent);
  }
  .eyebrow-dot {
    width: 8px; height: 8px; border-radius: 50%;
    box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent) 18%, transparent);
  }
  .lede {
    font-size: 19px;
    line-height: 1.5;
    color: var(--ink-2);
    max-width: 520px;
    margin: 0 0 36px;
  }
  .lede em { font-style: italic; color: var(--accent); font-weight: 500; }
  .hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 64px; }
  .hero-proof {
    list-style: none; padding: 0; margin: 0;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
    border-top: 0.5px solid var(--rule);
    border-bottom: 0.5px solid var(--rule);
    max-width: 520px;
  }
  .hero-proof li {
    padding: 22px 0;
    display: flex; flex-direction: column; gap: 4px;
    border-right: 0.5px solid var(--rule);
    padding-right: 16px;
    padding-left: 4px;
  }
  .hero-proof li:first-child { padding-left: 0; }
  .hero-proof li:last-child { border-right: none; }
  .hero-proof strong {
    font-family: var(--font-serif);
    font-size: 44px;
    line-height: 1;
    font-weight: 400;
    color: var(--accent);
  }
  .hero-proof span {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── HERO ART (proof panel) ─────────────────────────────────────────── */
  .hero-art { position: relative; }
  .proof-card {
    position: relative;
    aspect-ratio: 4 / 5;
    background: var(--paper);
    border-radius: 6px;
    box-shadow:
      0 1px 1px rgba(0,0,0,0.04),
      0 4px 14px rgba(0,0,0,0.06),
      0 30px 60px -20px rgba(0,0,0,0.18);
    overflow: hidden;
    transform: rotate(1.5deg);
    transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .proof-card:hover { transform: rotate(0deg) scale(1.02); }
  .proof-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(to right, rgba(26,34,51,0.06) 0.5px, transparent 0.5px),
      linear-gradient(to bottom, rgba(26,34,51,0.06) 0.5px, transparent 0.5px);
    background-size: 24px 24px;
    background-position: 12px 12px;
  }
  .proof-stack {
    position: relative;
    padding: 48px 44px;
    display: flex; flex-direction: column; gap: 20px;
    height: 100%;
    font-family: var(--font-serif);
    color: var(--ink);
  }
  .proof-tag {
    align-self: flex-start;
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    border: 0.5px dashed var(--rule);
    padding: 4px 8px;
    border-radius: 4px;
    margin-bottom: 8px;
  }
  .proof-line {
    font-size: 30px; line-height: 1.2; font-weight: 400;
  }
  .proof-line em { font-style: italic; }
  .proof-step {
    font-size: 24px; padding-left: 24px; line-height: 1.3;
    color: var(--ink-2);
  }
  .proof-step em { font-style: italic; }
  .proof-or {
    font-family: var(--font-mono);
    font-size: 13px; font-style: normal;
    color: var(--muted); padding: 0 6px;
  }
  .proof-tick {
    position: absolute;
    bottom: 96px; right: 56px;
    width: 56px; height: 56px;
    border: 1.5px solid currentColor;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transform: rotate(-8deg);
  }
  .proof-callout {
    position: absolute;
    bottom: 28px; left: 44px; right: 44px;
    display: flex; align-items: flex-start; gap: 12px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.4;
    padding-top: 16px;
    border-top: 0.5px dashed var(--rule);
  }
  .proof-callout-arrow {
    flex-shrink: 0;
    width: 14px; height: 2px;
    margin-top: 8px;
  }
  .proof-qed {
    position: absolute;
    bottom: 90px; left: 44px;
    font-size: 18px;
    color: var(--ink);
    opacity: 0.4;
  }

  /* ── ABOUT ────────────────────────────────────────────────────────────── */
  .about-grid {
    display: grid;
    grid-template-columns: 0.9fr 1.1fr;
    gap: 80px;
    align-items: start;
  }
  .photo-frame {
    aspect-ratio: 4 / 5;
    background: var(--paper);
    border: 0.5px solid var(--rule);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 16px;
    background-image:
      repeating-linear-gradient(
        45deg,
        transparent 0,
        transparent 12px,
        rgba(26,34,51,0.04) 12px,
        rgba(26,34,51,0.04) 13px
      );
  }
  .photo-placeholder {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .ph-mono {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }
  .ph-sub { font-size: 10.5px; opacity: 0.7; }
  .about-card {
    background: var(--paper);
    border: 0.5px solid var(--rule);
    border-radius: 8px;
    padding: 4px 18px;
  }
  .about-card-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 0;
    border-bottom: 0.5px dashed var(--rule);
    font-size: 14px;
  }
  .about-card-row:last-child { border-bottom: none; }
  .about-card-row span { color: var(--muted); }
  .about-card-row strong { color: var(--ink); font-weight: 500; }
  .about-copy { padding-top: 12px; }
  .about-copy p {
    font-size: 17px; line-height: 1.65; color: var(--ink-2);
    margin: 0 0 20px;
    max-width: 56ch;
  }
  .about-copy em { font-style: italic; color: var(--ink); font-weight: 500; }
  .about-lede {
    font-family: var(--font-serif);
    font-size: 28px !important;
    line-height: 1.25 !important;
    color: var(--ink) !important;
    font-weight: 400;
    margin-bottom: 32px !important;
  }
  .about-sign {
    margin-top: 36px;
    display: flex; align-items: center; gap: 14px;
    padding-top: 24px;
    border-top: 0.5px solid var(--rule);
    max-width: 56ch;
  }
  .sign-mark {
    font-family: var(--font-serif);
    font-size: 32px;
    color: var(--accent);
  }
  .sign-text {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 22px;
    color: var(--ink);
  }

  /* ── SUBJECTS ─────────────────────────────────────────────────────────── */
  .track-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .track {
    position: relative;
    background: var(--paper);
    border: 0.5px solid var(--rule);
    border-radius: 12px;
    padding: 32px 32px 28px;
    display: flex; flex-direction: column;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  }
  .track:hover {
    transform: translateY(-2px);
    border-color: var(--ink);
    box-shadow: 0 12px 32px -16px rgba(0,0,0,0.18);
  }
  .track-featured {
    background: var(--ink);
    color: #f5f1e8;
    border-color: var(--ink);
  }
  .track-featured .track-blurb,
  .track-featured .track-topics li {
    color: rgba(245, 241, 232, 0.78);
  }
  .track-featured .track-level-tag,
  .track-featured .track-level-ages {
    color: rgba(245, 241, 232, 0.6);
    border-color: rgba(245, 241, 232, 0.2);
  }
  /* Featured cards: hide the level tags, the flag stands in for them */
  .track-featured .track-level { visibility: hidden; }
  .track-head {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 24px;
  }
  .track-level {
    display: flex; flex-direction: column; gap: 4px;
  }
  .track-level-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 4px 8px;
    border: 0.5px solid var(--rule);
    border-radius: 4px;
    align-self: flex-start;
  }
  .track-level-ages {
    font-size: 12px;
    color: var(--muted);
    padding-left: 8px;
  }
  .track-glyph {
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 56px;
    line-height: 1;
    color: var(--muted);
    opacity: 0.6;
  }
  .track-featured .track-glyph { opacity: 1; }
  .track-title {
    font-family: var(--font-serif);
    font-size: 30px;
    font-weight: 400;
    line-height: 1.1;
    margin: 0 0 12px;
    letter-spacing: -0.01em;
  }
  .track-price {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 34px;
    line-height: 1;
    letter-spacing: -0.02em;
    margin: 0 0 18px;
    color: var(--ink);
  }
  .track-per {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 400;
    color: var(--muted);
    margin-left: 5px;
    letter-spacing: 0;
  }
  .track-featured .track-price { color: var(--paper); }
  .track-featured .track-per { color: rgba(245, 241, 232, 0.6); }
  .track-blurb {
    font-size: 14.5px;
    line-height: 1.55;
    color: var(--ink-2);
    margin: 0 0 24px;
    flex: 1;
  }
  .track-topics {
    list-style: none;
    margin: 0; padding: 0;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .track-topics li {
    font-size: 12px;
    padding: 5px 10px;
    border: 0.5px solid var(--rule);
    border-radius: 999px;
    color: var(--ink-2);
  }
  .track-flag {
    position: absolute;
    top: 28px; left: 28px;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 9px;
    border: 0.5px solid;
    border-radius: 4px;
    background: rgba(245, 241, 232, 0.05);
  }
  .subjects-foot {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 0.5px dashed var(--rule);
    display: flex; flex-wrap: wrap; gap: 10px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .exam-boards { color: var(--ink-2); }

  /* ── TRACKER ──────────────────────────────────────────────────────────── */
  .tracker-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: stretch;
  }
  .tracker-side {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 16px;
  }
  .tracker-card {
    background: var(--paper);
    border: 0.5px solid var(--rule);
    border-radius: 12px;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
  }
  .tracker-card-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 24px;
  }
  .tracker-card-tag {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .tracker-card-title {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 26px;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
    max-width: 22ch;
  }
  [data-wordmark="sans"] .tracker-card-title { font-weight: 600; letter-spacing: -0.025em; }
  .tracker-stat {
    display: flex; flex-direction: column; align-items: flex-end;
    line-height: 1; flex-shrink: 0;
  }
  .tracker-stat-num {
    font-family: var(--font-serif);
    font-size: 44px;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  [data-wordmark="sans"] .tracker-stat-num { font-weight: 600; }
  .tracker-stat-lbl {
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 6px;
    color: var(--muted);
  }
  .tracker-chart-body {
    position: relative;
    flex: 1;
    min-height: 180px;
  }
  .tracker-svg {
    width: 100%; height: 100%;
    color: var(--ink);
    overflow: visible;
  }
  .tracker-target {
    position: absolute;
    right: 0;
    transform: translateY(-100%);
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    background: var(--paper);
    padding: 0 6px;
  }
  .tracker-axis {
    display: flex; justify-content: space-between;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 0.5px dashed var(--rule);
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .tracker-goal-row {
    display: flex; align-items: center; gap: 18px;
    margin-top: auto;
    padding-top: 24px;
  }
  .tracker-goal-from {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .tracker-goal-grade {
    font-family: var(--font-serif);
    font-size: 64px;
    line-height: 1;
    font-weight: 400;
    color: var(--muted);
    letter-spacing: -0.02em;
  }
  [data-wordmark="sans"] .tracker-goal-grade { font-weight: 600; letter-spacing: -0.04em; }
  .tracker-goal-grade-target { color: inherit; }
  .tracker-goal-arrow {
    font-family: var(--font-serif);
    font-size: 32px;
    line-height: 1;
    flex: 1;
    text-align: center;
  }
  .tracker-checklist {
    list-style: none; padding: 0; margin: 8px 0 0;
    display: flex; flex-direction: column;
  }
  .tracker-checklist li {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0;
    border-bottom: 0.5px dashed var(--rule);
    font-size: 13.5px;
    color: var(--muted);
  }
  .tracker-checklist li:last-child { border-bottom: none; }
  .tracker-checklist li.done { color: var(--ink-2); text-decoration: line-through; text-decoration-color: var(--rule); }
  .tracker-checklist li.active { color: var(--ink); font-weight: 500; }
  .tracker-rates-head {
    margin-top: 28px;
    margin-bottom: 14px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .tracker-rates {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .tracker-rate {
    background: var(--ink);
    border-radius: 16px;
    padding: 30px 20px 26px;
    display: flex; flex-direction: column; align-items: center;
    gap: 14px;
    text-align: center;
  }
  .tracker-rate-lvl {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(245, 241, 232, 0.5);
  }
  .tracker-rate-price {
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 44px;
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--paper);
  }
  .tracker-rate-per {
    display: block;
    font-family: var(--font-sans);
    font-weight: 400;
    font-size: 13px;
    color: rgba(245, 241, 232, 0.5);
    margin-top: 8px;
    letter-spacing: 0;
  }
  .tracker-foot {
    margin-top: 14px;
    padding: 18px 24px;
    border: 0.5px solid var(--rule);
    border-radius: 10px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
  }
  .tracker-foot-item {
    display: flex; flex-direction: column; gap: 4px;
    border-right: 0.5px solid var(--rule);
    padding-right: 24px;
  }
  .tracker-foot-item:last-child { border-right: none; }
  .tracker-foot-k {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .tracker-foot-v {
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
  }
  .tracker-foot-sub {
    font-size: 12px;
    font-weight: 400;
    color: var(--muted);
    margin-left: 4px;
  }

  /* ── SAMPLE / FREE TRIAL ──────────────────────────────────────────────── */
  .sample {
    background: var(--ink);
    color: #f5f1e8;
    max-width: none;
    padding: 80px 32px;
  }
  .sample-inner {
    max-width: var(--maxw);
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 80px;
    align-items: center;
  }
  .sample-copy .section-title { color: #f5f1e8; }
  .sample-copy .section-title .muted { color: rgba(245,241,232,0.55); }
  .sample-copy p {
    font-size: 17px;
    line-height: 1.65;
    color: rgba(245,241,232,0.8);
    margin: 0 0 36px;
    max-width: 50ch;
  }
  .sample-steps { display: flex; flex-direction: column; gap: 22px; }
  .step {
    display: flex; gap: 18px; align-items: flex-start;
    padding: 18px 0;
    border-top: 0.5px solid rgba(245,241,232,0.12);
  }
  .step:last-child { border-bottom: 0.5px solid rgba(245,241,232,0.12); }
  .step-num {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border: 1px solid;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
    font-size: 14px;
    font-weight: 500;
    background: rgba(245,241,232,0.04);
  }
  .step strong { display: block; font-weight: 500; margin-bottom: 4px; color: #f5f1e8; }
  .step span { font-size: 14px; color: rgba(245,241,232,0.65); line-height: 1.5; }

  /* Receipt — "free trial as zero-pound invoice" */
  .sample-receipt {
    background: var(--paper);
    color: var(--ink);
    padding: 36px 32px 80px;
    border-radius: 4px;
    font-family: var(--font-mono);
    position: relative;
    box-shadow:
      0 1px 1px rgba(0,0,0,0.1),
      0 30px 80px -20px rgba(0,0,0,0.4);
    transform: rotate(-1deg);
    /* zigzag bottom edge */
    -webkit-mask:
      linear-gradient(#000, #000) top / 100% calc(100% - 12px) no-repeat,
      linear-gradient(-45deg, transparent 6px, #000 0) bottom left / 12px 12px repeat-x,
      linear-gradient(45deg, transparent 6px, #000 0) bottom left / 12px 12px repeat-x;
    -webkit-mask-composite: source-over;
            mask:
      linear-gradient(#000, #000) top / 100% calc(100% - 12px) no-repeat,
      linear-gradient(-45deg, transparent 6px, #000 0) bottom left / 12px 12px repeat-x,
      linear-gradient(45deg, transparent 6px, #000 0) bottom left / 12px 12px repeat-x;
  }
  .receipt-head {
    display: flex; justify-content: space-between;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-2);
    padding-bottom: 16px;
    border-bottom: 1px dashed var(--rule);
    margin-bottom: 20px;
  }
  .receipt-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0;
    font-size: 13px;
    color: var(--ink-2);
  }
  .receipt-row span:last-child { color: var(--ink); }
  .receipt-rule {
    height: 0;
    border-top: 1px dashed var(--rule);
    margin: 8px 0;
  }
  .receipt-total { font-size: 14px; padding-top: 12px; }
  .receipt-total strong { font-weight: 500; color: var(--ink); }
  .receipt-was {
    color: var(--muted);
    opacity: 0.65;
    margin-right: 8px;
    font-weight: 400;
    text-decoration-thickness: 1px;
  }
  .receipt-stamp {
    position: absolute;
    bottom: 36px; right: 32px;
    border: 1.5px solid;
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.12em;
    transform: rotate(-6deg);
    opacity: 0.85;
  }

  /* ── CONTACT ──────────────────────────────────────────────────────────── */
  .contact-inner {
    text-align: center;
    max-width: 720px;
    margin: 0 auto;
  }
  .contact-title {
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: clamp(40px, 6vw, 76px);
    line-height: 1.05;
    letter-spacing: -0.015em;
    margin: 0 0 24px;
  }
  .contact-sub {
    font-size: 18px;
    color: var(--muted);
    margin: 0 0 40px;
  }
  .contact-meta {
    margin-top: 64px;
    padding-top: 32px;
    border-top: 0.5px solid var(--rule);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 32px;
    font-size: 13px;
    text-align: left;
  }
  .contact-meta > div { display: flex; flex-direction: column; gap: 4px; }
  .meta-k {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .meta-v { color: var(--ink); font-weight: 500; }
  .contact-phone {
    display: block;
    width: fit-content;
    margin: 28px auto 0;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 30px;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-decoration: none;
  }
  .contact-phone:hover { color: var(--accent); }
  .contact-phone-label {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  /* ── FOOTER ───────────────────────────────────────────────────────────── */
  .footer { border-top: 0.5px solid var(--rule); }
  .footer-inner {
    max-width: var(--maxw);
    margin: 0 auto;
    padding: 32px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px;
  }
  .footer-meta {
    display: flex; gap: 12px;
    font-size: 12.5px;
    color: var(--muted);
    font-family: var(--font-mono);
  }

  /* ── RESPONSIVE ───────────────────────────────────────────────────────── */
  @media (max-width: 900px) {
    section { padding: 80px 24px; }
    .nav-inner { padding: 14px 20px; }
    .nav-links { gap: 16px; }
    .nav-links a:not(.nav-cta) { display: none; }
    .hero-grid { grid-template-columns: 1fr; gap: 56px; }
    .hero-art { max-width: 420px; }
    .about-grid { grid-template-columns: 1fr; gap: 48px; }
    .track-grid { grid-template-columns: 1fr; }
    .sample { padding: 80px 24px; }
    .sample-inner { grid-template-columns: 1fr; gap: 56px; }
    .contact-meta { grid-template-columns: 1fr; gap: 16px; }
    .tracker-grid { grid-template-columns: 1fr; }
    .tracker-foot { grid-template-columns: repeat(2, 1fr); gap: 18px; }
    .tracker-foot-item:nth-child(2) { border-right: none; }
  }

  /* ── SANS MODE ─────────────────────────────────────────────────────────
     When wordmark="sans", the whole page flips to Inter Tight. Display
     text loses italic + needs tighter tracking and heavier weight to
     stand up where the serif's flair used to. */
  [data-wordmark="sans"] .display,
  [data-wordmark="sans"] .section-title,
  [data-wordmark="sans"] .contact-title,
  [data-wordmark="sans"] .track-title,
  [data-wordmark="sans"] .about-lede {
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  [data-wordmark="sans"] .display { font-size: clamp(52px, 8vw, 100px); line-height: 0.98; }
  [data-wordmark="sans"] .display-em { font-style: normal; }
  [data-wordmark="sans"] .section-title .muted { font-style: normal; }
  [data-wordmark="sans"] .hero-proof strong { font-weight: 700; font-size: 38px; }
  [data-wordmark="sans"] .proof-line em,
  [data-wordmark="sans"] .proof-step em,
  [data-wordmark="sans"] .lede em,
  [data-wordmark="sans"] .about-copy em,
  [data-wordmark="sans"] .sign-text {
    font-style: normal;
    font-weight: 600;
  }
  [data-wordmark="sans"] .track-glyph { font-style: normal; font-weight: 500; }
  [data-wordmark="sans"] .proof-stack { font-family: var(--font-sans); }
  [data-wordmark="sans"] .proof-line { font-size: 26px; font-weight: 500; }
  [data-wordmark="sans"] .proof-step { font-size: 21px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="logo.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "businessName": "Saf",
  "logoMark": "therefore",
  "wordmarkKind": "sans",
  "theme": "paper",
  "accent": "#c2410c"
}/*EDITMODE-END*/;

// Theme presets — applied as CSS custom properties on :root.
const THEMES = {
  paper: {
    label: 'Paper (warm)',
    vars: {
      '--bg': '#f5f1e8',
      '--bg-2': '#efe9dc',
      '--paper': '#faf6ec',
      '--ink': '#1a2233',
      '--ink-2': '#2c3849',
      '--muted': '#6e7686',
      '--rule': 'rgba(26, 34, 51, 0.12)',
    },
  },
  ink: {
    label: 'Ink (dark)',
    vars: {
      '--bg': '#161922',
      '--bg-2': '#1f2330',
      '--paper': '#222633',
      '--ink': '#f0ece1',
      '--ink-2': '#c8c2b3',
      '--muted': '#8a8473',
      '--rule': 'rgba(240, 236, 225, 0.14)',
    },
  },
  bone: {
    label: 'Bone (cool)',
    vars: {
      '--bg': '#eef0f2',
      '--bg-2': '#e6e9ec',
      '--paper': '#f7f8fa',
      '--ink': '#0e1622',
      '--ink-2': '#293446',
      '--muted': '#6c7585',
      '--rule': 'rgba(14, 22, 34, 0.12)',
    },
  },
};

function applyTheme(theme, accent) {
  const root = document.documentElement;
  const t = THEMES[theme] || THEMES.paper;
  Object.entries(t.vars).forEach(([k, v]) => root.style.setProperty(k, v));
  root.style.setProperty('--accent', accent);
  // Soft accent (8% alpha) for subtle highlights
  root.style.setProperty('--accent-soft',
    `color-mix(in oklab, ${accent} 12%, transparent)`);
}

// When the wordmark is sans, make the entire page sans (display + body all
// become Inter Tight). When serif, the page leans serif — body stays sans for
// readability, but display/section titles already use --font-serif so they
// follow. This mode also kills italic styling on display text since sans
// italics look weak.
function applyWordmarkFont(kind) {
  const root = document.documentElement;
  if (kind === 'sans') {
    // Whole page becomes Poppins — matching the SafMaths flyer.
    root.style.setProperty('--font-serif',
      '"Poppins", system-ui, sans-serif');
    root.style.setProperty('--font-sans',
      '"Poppins", system-ui, sans-serif');
    root.setAttribute('data-wordmark', 'sans');
  } else {
    // Serif headings, Poppins body.
    root.style.setProperty('--font-serif',
      '"Instrument Serif", "Cormorant Garamond", Georgia, serif');
    root.style.setProperty('--font-sans',
      '"Poppins", system-ui, -apple-system, sans-serif');
    root.setAttribute('data-wordmark', 'serif');
  }
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    applyTheme(t.theme, t.accent);
  }, [t.theme, t.accent]);

  React.useEffect(() => {
    applyWordmarkFont(t.wordmarkKind);
  }, [t.wordmarkKind]);

  return (
    <>
      <nav className="nav">
        <div className="nav-inner">
          <a href="#" aria-label="Home" style={{ display: 'inline-flex', color: 'var(--ink)' }}>
            <Logo
              mark={t.logoMark}
              name={t.businessName}
              kind={t.wordmarkKind}
              markSize={26}
              textSize={20}
            />
          </a>
          <div className="nav-links">
            <a href="#about">About</a>
            <a href="#subjects">Subjects</a>
            <a href="#sample">Free trial</a>
            <a className="nav-cta" href="#contact">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2.05 22l5.25-1.38a9.87 9.87 0 0 0 4.74 1.21h.01c5.46 0 9.91-4.45 9.91-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2z"/>
              </svg>
              WhatsApp
            </a>
          </div>
        </div>
      </nav>

      <main>
        <Hero t={t} accent={t.accent} />
        <About t={t} />
        <Subjects t={t} accent={t.accent} />
        <Tracker t={t} accent={t.accent} />
        <Sample t={t} accent={t.accent} />
        <Contact t={t} accent={t.accent} />
      </main>

      <Footer name={t.businessName} mark={t.logoMark} kind={t.wordmarkKind} />

      <TweaksPanel title="Tweaks">
        <TweakSection label="Brand" />
        <TweakText
          label="Business name"
          value={t.businessName}
          onChange={(v) => setTweak('businessName', v)}
        />
        <TweakRadio
          label="Logo mark"
          value={t.logoMark}
          options={[
            { value: 'therefore', label: '∴' },
            { value: 'axis', label: '✚' },
            { value: 'proof', label: '◆' },
          ]}
          onChange={(v) => setTweak('logoMark', v)}
        />
        <TweakRadio
          label="Wordmark"
          value={t.wordmarkKind}
          options={[
            { value: 'serif', label: 'Serif' },
            { value: 'sans', label: 'Sans' },
          ]}
          onChange={(v) => setTweak('wordmarkKind', v)}
        />

        <TweakSection label="Theme" />
        <TweakSelect
          label="Palette"
          value={t.theme}
          options={[
            { value: 'paper', label: 'Paper (warm)' },
            { value: 'bone', label: 'Bone (cool)' },
            { value: 'ink', label: 'Ink (dark)' },
          ]}
          onChange={(v) => setTweak('theme', v)}
        />
        <TweakColor
          label="Accent"
          value={t.accent}
          onChange={(v) => setTweak('accent', v)}
        />
        <TweakSection label="Accent presets" />
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {[
            ['Ochre', '#c2410c'],
            ['Forest', '#2d6a4f'],
            ['Plum', '#7c2d4b'],
            ['Ink blue', '#1e3a8a'],
            ['Brick', '#9b2c2c'],
          ].map(([label, val]) => (
            <button
              key={val}
              onClick={() => setTweak('accent', val)}
              style={{
                appearance: 'none',
                border: t.accent === val ? '1.5px solid var(--ink, #1a2233)' : '0.5px solid rgba(0,0,0,0.15)',
                background: val,
                width: 24, height: 24, borderRadius: 6, cursor: 'pointer',
              }}
              title={label}
              aria-label={label}
            />
          ))}
        </div>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
